name: CI - Build & Test (Windows)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Build main exe
        run: msbuild src/Toolbox.vcxproj /p:Configuration="Release" /p:Platform="Win32"

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Build main library
        run: msbuild src/Toolbox.vcxproj /p:Configuration="TestLib" /p:Platform="Win32"
      - name: Build tests
        run: msbuild tests/Tests.vcxproj /p:Configuration="Debug" /p:Platform="Win32"
      - name: Run tests
        shell: pwsh
        run: |
          & "tests/Debug/Tests.exe" --exit --success
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
